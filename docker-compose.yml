services:
  api:
    build: ./api
    env_file: .env
    environment:
      - DATA_DIR=/data
      - WEB_ORIGIN=http://localhost:5173
    ports:
      - "8000:8000"
    volumes:
      # Host bind mount — data lives in ./data (repo root) on your machine, so
      # it survives `docker compose down -v`, volume prune, and `make cleanup`.
      - ./data:/data
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build: ./web
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
